name: Ingestion CI

on:
  push:
    branches: [main, dev]
    paths:
      - "ingestion/**"
      - ".github/workflows/ingestion-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "ingestion/**"

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          REDIS_URL: redis://localhost:6379/0
          HMAC_SECRET: ci-test-secret-not-production
          REQUIRE_HMAC: "false"
        run: |
          pytest tests/ -v --tb=short \
            --cov=. --cov-report=xml --cov-report=term-missing \
            --junitxml=test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ingestion/coverage.xml
          flags: ingestion

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-test-results
          path: ingestion/test-results.xml

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ingestion image
        uses: docker/build-push-action@v5
        with:
          context: ./ingestion
          file: ./ingestion/Dockerfile
          push: false
          tags: labyrinth-ingestion:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          docker run -d --name ingestion-test \
            -e REQUIRE_HMAC=false \
            -e REDIS_URL=redis://localhost:6379/0 \
            -p 8001:8001 \
            labyrinth-ingestion:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8001/healthz || (docker logs ingestion-test && exit 1)
          docker stop ingestion-test
